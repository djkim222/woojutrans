  <style>

    .status-title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 6px;

    .status-box.processing .status-title { color: #b39ddb; }
    .status-box.success .status-title { color: #a5d6a7; }

    .status-body {

    .changed-count {

    /* 다운로드 버튼 */

      display: none;

<body>
<div class="container">
  <div class="header">
    <div class="store-badge">🪐 우주스토어 연동</div>
    <h1>주문내역 품목명 변환기</h1>
    <p class="subtitle">받은 주문파일을 업로드하면 품목명을 자동 변환해 드려요</p>
  </div>

  <!-- 드롭존 -->
  <div class="dropzone" id="dropzone">
    <span class="drop-icon">📦</span>
    <p class="drop-title">여기에 파일을 드래그하여 놓으세요</p>
    <p class="drop-sub">xlsx · xls · csv 파일 지원</p>
    <button class="file-btn" onclick="document.getElementById(&#39;fileInput&#39;).click()">
      파일 직접 선택하기
    </button>
    <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
  </div>

  <!-- 변환 규칙 -->
  <div class="rules-section">
    <div class="rules-title">📋 자동 변환 규칙</div>
    <div class="rule-item">
      <span class="rule-from">밀크</span>
      <span class="rule-arrow">→</span>
      <span class="rule-to">시그니처_밀크 크레이프 케이크</span>
    </div>
    <div class="rule-item">
      <span class="rule-from">블루베리</span>
      <span class="rule-arrow">→</span>
      <span class="rule-to">시그니처_블루베리 크레이프 케이크</span>
    </div>
    <div class="rule-item">
      <span class="rule-from">초코</span>
      <span class="rule-arrow">→</span>
      <span class="rule-to">시그니처_초코 크레이프 케이크</span>
    </div>
    <div class="rule-item">
      <span class="rule-from">쵸코</span>
      <span class="rule-arrow">→</span>
      <span class="rule-to">시그니처_초코 크레이프 케이크</span>
    </div>
    <div class="rule-note">
      <span>세트 품목</span> &nbsp;'밀 초', '밀 블' 등 두 가지 제품 조합은 변경하지 않고 유지됩니다.
    </div>
  </div>

  <!-- 처리 상태 -->
  <div class="status-box" id="statusBox">
    <div class="status-title" id="statusTitle"></div>
    <div class="status-body" id="statusBody"></div>
  </div>

  <!-- 다운로드 버튼 -->
  <button class="download-btn" id="downloadBtn">⬇️ 변환된 파일 다운로드</button>

  <div class="footer">파일은 브라우저 안에서만 처리되며 서버에 전송되지 않습니다.</div>
</div>

<script>
  // ─────────────────────────────────────────────
  // 변환 규칙 정의
  // ─────────────────────────────────────────────
  const NAME_MAP = {
    '밀크':   '시그니처_밀크 크레이프 케이크',
    '블루베리': '시그니처_블루베리 크레이프 케이크',
    '초코':   '시그니처_초코 크레이프 케이크',
    '쵸코':   '시그니처_초코 크레이프 케이크',
  };

  // 세트 품목 판별: 키워드 약칭(밀·블·초·쵸)이 두 개 이상 공백으로 연결된 경우
  const SET_PATTERN = /^(밀|블|초|쵸|블루)\s+(밀|블|초|쵸|블루)/;

  // 변환 대상 정규식: [업로드코드]-품목명  (코드 부분 캡처)
  // 코드는 숫자/영문/언더바 조합, 이후 '-' 로 구분, 나머지가 품목명
  const CELL_PATTERN = /^(.+?)-(.+)$/;

  let convertedWorkbook = null;
  let originalFileName   = '';
  let fileExt            = '';

  // ─────────────────────────────────────────────
  // 셀 값 변환 함수
  // ─────────────────────────────────────────────
  function convertCellValue(val) {
    if (typeof val !== 'string') return { value: val, changed: false };

    const m = val.match(CELL_PATTERN);
    if (!m) return { value: val, changed: false };

    const code    = m[1];
    const nameRaw = m[2].trim();

    // 세트 품목이면 그대로
    if (SET_PATTERN.test(nameRaw)) {
      return { value: val, changed: false };
    }

    // 매핑 키 정확히 일치?
    if (NAME_MAP[nameRaw]) {
      return { value: `${code}-${NAME_MAP[nameRaw]}`, changed: true, from: nameRaw, to: NAME_MAP[nameRaw] };
    }

    return { value: val, changed: false };
  }

  // ─────────────────────────────────────────────
  // 워크북 전체 변환
  // ─────────────────────────────────────────────
  function processWorkbook(wb) {
    let totalChanged = 0;
    const details = {};

    wb.SheetNames.forEach(sheetName => {
      const ws = wb.Sheets[sheetName];
      const range = XLSX.utils.decode_range(ws['!ref'] || 'A1:A1');

      for (let R = range.s.r; R <= range.e.r; R++) {
        for (let C = range.s.c; C <= range.e.c; C++) {
          const addr = XLSX.utils.encode_cell({ r: R, c: C });
          const cell = ws[addr];
          if (!cell || cell.v == null) continue;

          const result = convertCellValue(String(cell.v));
          if (result.changed) {
            cell.v = result.value;
            if (cell.w !== undefined) cell.w = result.value; // formatted text
            totalChanged++;
            const key = `${result.from} → ${result.to}`;
            details[key] = (details[key] || 0) + 1;
          }
        }
      }
    });

    return { totalChanged, details };
  }

  // ─────────────────────────────────────────────
  // UI 상태 업데이트
  // ─────────────────────────────────────────────
  function setStatus(type, title, body) {
    const box = document.getElementById('statusBox');
    box.className = `status-box ${type}`;
    document.getElementById('statusTitle').innerHTML = title;
    document.getElementById('statusBody').innerHTML  = body;
  }

  // ─────────────────────────────────────────────
  // 파일 처리 메인
  // ─────────────────────────────────────────────
  function handleFile(file) {
    if (!file) return;

    originalFileName = file.name;
    fileExt = originalFileName.split('.').pop().toLowerCase();
    document.getElementById('downloadBtn').classList.remove('visible');
    convertedWorkbook = null;

    setStatus('processing',
      `<span class="spinner"></span>파일 처리 중…`,
      `<b>${originalFileName}</b> 을 분석하고 있어요.`
    );

    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const data = new Uint8Array(e.target.result);
        const wb   = XLSX.read(data, { type: 'array', cellStyles: true });
        const { totalChanged, details } = processWorkbook(wb);

        convertedWorkbook = wb;

        let detailHtml = '';
        if (Object.keys(details).length > 0) {
          detailHtml = '<div style="margin-top:10px;font-size:12px;">';
          Object.entries(details).forEach(([k, cnt]) => {
            detailHtml += `<div style="color:rgba(255,255,255,0.5);margin-top:4px;">• ${k} &nbsp;<span style="color:#a5d6a7;">(${cnt}건)</span></div>`;
          });
          detailHtml += '</div>';
        }

        if (totalChanged === 0) {
          setStatus('success',
            '✅ 변환 완료 (변경 없음)',
            `파일을 확인했지만 변환 대상 품목명을 찾지 못했어요.<br>
             그래도 원본 파일을 그대로 다운로드할 수 있어요.`
          );
        } else {
          setStatus('success',
            '✅ 변환 완료!',
            `총 <span class="changed-count">${totalChanged}건</span>의 품목명이 변환됐어요.${detailHtml}`
          );
        }

        document.getElementById('downloadBtn').classList.add('visible');
      } catch (err) {
        setStatus('error', '❌ 파일 처리 실패', `오류: ${err.message}<br>올바른 Excel 또는 CSV 파일인지 확인해 주세요.`);
      }
    };

    reader.readAsArrayBuffer(file);
  }

  // ─────────────────────────────────────────────
  // 다운로드
  // ─────────────────────────────────────────────
  document.getElementById('downloadBtn').addEventListener('click', () => {
    if (!convertedWorkbook) return;

    const baseName  = originalFileName.replace(/\.[^.]+$/, '');
    const outName   = `${baseName}_변환완료.xlsx`;
    XLSX.writeFile(convertedWorkbook, outName);
  });

  // ─────────────────────────────────────────────
  // 드래그앤드롭
  // ─────────────────────────────────────────────
  const dz = document.getElementById('dropzone');

  dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', e => { dz.classList.remove('drag-over'); });
  dz.addEventListener('drop', e => {
    e.preventDefault();
    dz.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  });

  document.getElementById('fileInput').addEventListener('change', e => {
    const file = e.target.files[0];
    if (file) handleFile(file);
    e.target.value = ''; // 같은 파일 재선택 가능하게 초기화
  });
</script>
